<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&D Trial Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root{
  --bg:#0c100a;--bg2:#141a0f;--bg3:#1e2917;
  --border:rgba(168,210,80,0.2);--border2:rgba(168,210,80,0.45);
  --green:#c8f060;--green-dim:#8ab83a;
  --teal:#3de8b0;--amber:#ffbe3a;--coral:#ff6e4a;--blue:#70c4f8;
  --text:#eaf5d0;--text2:#a8c878;--text3:#607848;
  --done:#2a3820;--done-text:#5a7840;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;padding:0 0 4rem}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:200}
.logo{font-family:'DM Mono',monospace;font-size:13px;color:var(--green);letter-spacing:.12em;text-transform:uppercase}
.logo span{color:var(--text3)}
.header-right{display:flex;align-items:center;gap:12px}
#save-status{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);min-width:80px;text-align:right}
#save-status.saving{color:var(--amber)}
#save-status.saved{color:var(--green)}
#save-status.error{color:var(--coral)}
#last-updated{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}
.hbtn{font-family:'DM Mono',monospace;font-size:11px;color:var(--green-dim);background:none;border:1px solid var(--border2);border-radius:4px;padding:5px 10px;cursor:pointer;transition:all .15s}
.hbtn:hover{color:var(--green);border-color:var(--green)}

main{padding:1.5rem 2rem;max-width:1500px;margin:0 auto}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.75rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat-value{font-size:32px;font-weight:300;line-height:1;margin-bottom:4px}
.stat-value.urgent{color:var(--coral)}
.stat-sub{font-size:11px;color:var(--text3)}

/* Filters */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem}
.filter-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.fb{font-family:'DM Mono',monospace;font-size:11px;padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.fb:hover{color:var(--text2);border-color:var(--border2)}
.fb.on{background:var(--bg3);border-color:var(--green);color:var(--green)}
.filter-sep{width:1px;height:16px;background:var(--border);margin:0 2px}

/* Section */
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.section-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.12em}
.section-line{flex:1;height:1px;background:var(--border)}

/* Legend */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.ls{width:20px;height:9px;border-radius:2px}

/* ── Gantt ── */
.gantt-outer{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:2rem}
.gantt-header-row{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.gantt-label-col{width:240px;min-width:240px;flex-shrink:0;padding:8px 14px;border-right:1px solid var(--border)}
.gantt-label-col-head{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.gantt-axis-wrap{flex:1;overflow:hidden;position:relative}
.gantt-axis{height:32px;position:relative;cursor:grab;user-select:none}
.gantt-axis.dragging{cursor:grabbing}
.axis-tick{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;pointer-events:none}
.axis-tick-line{width:1px;height:8px;background:var(--border2)}
.axis-tick-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;margin-top:3px}

.gantt-body{overflow:hidden}
.gantt-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:62px}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:var(--bg2)}
.gantt-meta{width:240px;min-width:240px;padding:10px 14px;border-right:1px solid var(--border);flex-shrink:0;cursor:pointer}
.gantt-meta:hover .gn{color:var(--green)}
.gn{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;transition:color .15s}
.gs{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.gmeta-sub{display:flex;gap:6px;align-items:center}
.rb{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.r1{background:rgba(61,232,176,.18);color:var(--teal);border:1px solid rgba(61,232,176,.35)}
.r2{background:rgba(255,190,58,.18);color:var(--amber);border:1px solid rgba(255,190,58,.35)}
.r3{background:rgba(112,196,248,.18);color:var(--blue);border:1px solid rgba(112,196,248,.35)}
.cohort-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}
.days-label{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}

.gantt-track-wrap{flex:1;overflow:hidden;position:relative}
.gantt-track{height:100%;position:relative;cursor:default}
.bar{position:absolute;height:22px;top:50%;transform:translateY(-50%);border-radius:4px;display:flex;align-items:center;padding:0 8px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;letter-spacing:.04em;transition:filter .15s;cursor:pointer}
.bar:hover{filter:brightness(1.25)}
.bpend{background:rgba(112,196,248,.2);color:var(--blue);border:1px solid rgba(112,196,248,.4)}
.bveg{background:rgba(200,240,96,.2);color:var(--green);border:1px solid rgba(200,240,96,.4)}
.bflr{background:rgba(61,232,176,.2);color:var(--teal);border:1px solid rgba(61,232,176,.4)}
.bcure{background:rgba(255,110,74,.2);color:var(--coral);border:1px solid rgba(255,110,74,.45)}
.bdone{background:var(--done);color:var(--done-text);border:1px solid rgba(90,120,64,.3)}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--coral);opacity:.7;z-index:5;pointer-events:none}

/* Tooltip */
.tooltip{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);pointer-events:none;z-index:999;opacity:0;transition:opacity .1s}
.tooltip.show{opacity:1}

/* ── Detail table ── */
.table-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:2rem}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{text-align:left;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}

/* Editable cells */
.editable{cursor:pointer;border-radius:4px;transition:background .12s}
.editable:hover{background:var(--bg3)}
.editable.editing{background:transparent;padding:0}
.editable input,.editable select{width:100%;background:var(--bg3);border:1px solid var(--green-dim);border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:4px 6px;outline:none}
.editable input:focus,.editable select:focus{border-color:var(--green)}

/* Stage / badge pills */
.sp{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.sppend{background:rgba(112,196,248,.18);color:var(--blue)}
.spveg{background:rgba(200,240,96,.18);color:var(--green)}
.spflr{background:rgba(61,232,176,.18);color:var(--teal)}
.spcure{background:rgba(255,110,74,.2);color:var(--coral)}
.spdone{background:var(--done);color:var(--done-text)}
.nb{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:10px;white-space:nowrap}
.nok{background:rgba(200,240,96,.18);color:var(--green)}
.nsoon{background:rgba(255,190,58,.2);color:var(--amber)}
.nurg{background:rgba(255,110,74,.22);color:var(--coral)}
.ndone{background:var(--done);color:var(--done-text)}

/* Todo chip */
.tc{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:10px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .12s}
.tc:hover{border-color:var(--green);color:var(--green)}
.tp{display:none;position:absolute;z-index:300;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;min-width:240px;max-width:320px;right:0;top:32px}
.tp.open{display:block}
.ti{font-size:12px;color:var(--text);padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;line-height:1.5;white-space:normal}
.ti:last-child{border-bottom:none}
.td-dot{width:4px;height:4px;border-radius:50%;background:var(--green-dim);margin-top:7px;flex-shrink:0}

/* Notes panel */
.notes-row td{padding:0;background:var(--bg2)}
.notes-panel{padding:10px 14px 14px;border-top:1px solid var(--border)}
.notes-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.notes-ta{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;resize:vertical;min-height:60px;outline:none;transition:border-color .15s;line-height:1.6}
.notes-ta:focus{border-color:var(--green-dim)}
.notes-save{font-family:'DM Mono',monospace;font-size:11px;margin-top:6px;padding:4px 12px;background:transparent;border:1px solid var(--green-dim);border-radius:4px;color:var(--green-dim);cursor:pointer;transition:all .15s}
.notes-save:hover{color:var(--green);border-color:var(--green)}

/* Loading / error */
#loading,#error-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;gap:12px;color:var(--text3);font-family:'DM Mono',monospace;font-size:13px;text-align:center;line-height:1.8}
.spinner{width:24px;height:24px;border:1.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-msg{color:var(--coral);display:none}
.divider{border:none;border-top:1px solid var(--border);margin:2rem 0}
</style>
</head>
<body>

<header>
  <div class="logo">R<span>&amp;</span>D <span>//</span> Trial Tracker</div>
  <div class="header-right">
    <span id="save-status"></span>
    <span id="last-updated"></span>
    <button class="hbtn" onclick="loadData()">&#8635; Refresh</button>
  </div>
</header>

<main>
  <div id="loading"><div class="spinner"></div>Loading trial data…</div>
  <div id="error-msg"></div>
  <div id="app" style="display:none">

    <div class="stats" id="stats"></div>

    <div class="filter-row">
      <span class="filter-label">Room</span>
      <button class="fb on" data-g="room" data-v="all" onclick="sf(this)">All</button>
      <button class="fb" data-g="room" data-v="Tunable" onclick="sf(this)">Tunable</button>
      <button class="fb" data-g="room" data-v="HPS" onclick="sf(this)">HPS</button>
      <button class="fb" data-g="room" data-v="LED" onclick="sf(this)">LED</button>
      <div class="filter-sep"></div>
      <span class="filter-label">Stage</span>
      <button class="fb on" data-g="stage" data-v="all" onclick="sf(this)">All</button>
      <button class="fb" data-g="stage" data-v="Pending" onclick="sf(this)">Pending</button>
      <button class="fb" data-g="stage" data-v="Veg" onclick="sf(this)">Veg</button>
      <button class="fb" data-g="stage" data-v="Flower" onclick="sf(this)">Flower</button>
      <button class="fb" data-g="stage" data-v="Cure" onclick="sf(this)">Cure</button>
      <button class="fb" data-g="stage" data-v="Complete" onclick="sf(this)">Complete</button>
    </div>

    <div class="section-head"><span class="section-title">Timeline</span><div class="section-line"></div></div>
    <div class="legend">
      <div class="li"><div class="ls" style="background:rgba(112,196,248,.35)"></div>Pending</div>
      <div class="li"><div class="ls" style="background:rgba(200,240,96,.35)"></div>Veg</div>
      <div class="li"><div class="ls" style="background:rgba(61,232,176,.35)"></div>Flower</div>
      <div class="li"><div class="ls" style="background:rgba(255,110,74,.35)"></div>Cure</div>
      <div class="li"><div style="width:2px;height:14px;background:var(--coral);opacity:.7;border-radius:1px"></div>Today</div>
      <div class="li" style="margin-left:auto;font-size:11px;color:var(--text3)">← drag to scroll →</div>
    </div>

    <div class="gantt-outer">
      <div class="gantt-header-row">
        <div class="gantt-label-col"><span class="gantt-label-col-head">Trial</span></div>
        <div class="gantt-axis-wrap"><div class="gantt-axis" id="gantt-axis"></div></div>
      </div>
      <div class="gantt-body" id="gantt-body"></div>
    </div>

    <div class="divider"></div>
    <div class="section-head"><span class="section-title">All Trials</span><div class="section-line"></div></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:30px">C#</th>
          <th style="width:160px">Trial</th>
          <th style="width:120px">Strain</th>
          <th style="width:72px">Room</th>
          <th style="width:78px">Transplant</th>
          <th style="width:62px">Flip</th>
          <th style="width:72px">Harvest</th>
          <th style="width:78px">Cure done</th>
          <th style="width:120px">Next milestone</th>
          <th style="width:220px">To-do</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>
</main>

<div class="tooltip" id="tooltip"></div>

<script>
// ══════════════════════════════════════════════
//  Paste your Apps Script Web App URL here
//  (from Deploy > Manage deployments > copy URL)
// ══════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzHLQLc0v3AXTaFAxLwEXmBBM7JYiJwR3SQt-YPIXTsTANb6deeBPKfiYXlK81otcBxew/exec';

// ─────────────────────────────────────────────
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let TRIALS = [];
let openPopup = null;
let openNotes = null;
const F = { room:'all', stage:'all' };

// px per day — controls zoom level
let PX_PER_DAY = 14;
// scroll offset in px (how far left we've panned)
let scrollX = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartScroll = 0;

// ── Data loading ──────────────────────────────
async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    showError('Paste your Apps Script URL into the SCRIPT_URL variable at the top of the script.');
    return;
  }
  try {
    const res = await fetch(SCRIPT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    TRIALS = data.map(t => ({
      ...t,
      transplant: t.transplant ? new Date(t.transplant) : null,
      flip:       t.flip       ? new Date(t.flip)       : null,
      harvest:    t.harvest    ? new Date(t.harvest)     : null,
      cure:       t.cure       ? new Date(t.cure)        : null,
    }));
    TRIALS.forEach(t => { if(t.transplant) t.transplant.setHours(0,0,0,0); if(t.flip) t.flip.setHours(0,0,0,0); if(t.harvest) t.harvest.setHours(0,0,0,0); if(t.cure) t.cure.setHours(0,0,0,0); });

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Scroll to show today near the centre
    centreOnToday();
    render();
  } catch(e) {
    showError('Could not load data: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.style.display = 'flex';
  el.textContent = '⚠ ' + msg;
}

// ── Save a single field back to the Sheet ─────
async function saveField(cohort, field, value) {
  setSaveStatus('saving', 'Saving…');
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ cohort, field, value }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);
    setSaveStatus('saved', 'Saved ✓');
    setTimeout(() => setSaveStatus('', ''), 2000);
    // Update local data
    const t = TRIALS.find(t => t.cohort === cohort);
    if (t) {
      if (['transplant','flip','harvest','cure'].includes(field)) {
        t[field] = value ? new Date(value) : null;
        if (t[field]) t[field].setHours(0,0,0,0);
      } else {
        t[field] = value;
      }
      render();
    }
  } catch(e) {
    setSaveStatus('error', 'Error: ' + e.message);
    setTimeout(() => setSaveStatus('', ''), 4000);
  }
}

function setSaveStatus(cls, text) {
  const el = document.getElementById('save-status');
  el.className = cls;
  el.textContent = text;
}

// ── Gantt scroll / drag ───────────────────────
function centreOnToday() {
  const trackW = document.querySelector('.gantt-track-wrap')?.clientWidth || 800;
  const allDates = TRIALS.flatMap(t => [t.transplant, t.cure]).filter(Boolean);
  if (!allDates.length) return;
  const minD = allDates.reduce((a,b) => a<b?a:b);
  const todayOffset = (TODAY - minD) / 86400000 * PX_PER_DAY;
  scrollX = Math.max(0, todayOffset - trackW / 2);
}

function initDrag(container) {
  container.addEventListener('mousedown', e => {
    isDragging = true; dragStartX = e.clientX; dragStartScroll = scrollX;
    container.classList.add('dragging');
  });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = dragStartX - e.clientX;
    scrollX = Math.max(0, dragStartScroll + dx);
    renderGantt();
  });
  document.addEventListener('mouseup', () => {
    isDragging = false;
    document.querySelectorAll('.gantt-axis').forEach(el => el.classList.remove('dragging'));
  });
  // Touch
  container.addEventListener('touchstart', e => {
    dragStartX = e.touches[0].clientX; dragStartScroll = scrollX;
  }, {passive:true});
  container.addEventListener('touchmove', e => {
    const dx = dragStartX - e.touches[0].clientX;
    scrollX = Math.max(0, dragStartScroll + dx);
    renderGantt();
  }, {passive:true});
}

// ── Tooltip ───────────────────────────────────
const ttEl = document.getElementById('tooltip');
function showTip(text, e) {
  ttEl.textContent = text;
  ttEl.classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  ttEl.style.left = (e.clientX + 14) + 'px';
  ttEl.style.top  = (e.clientY - 28) + 'px';
}
function hideTip() { ttEl.classList.remove('show'); }

// ── Helpers ───────────────────────────────────
function dd(d) { return d instanceof Date ? d : null; }
function fmtD(d) {
  if (!d) return '—';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}
function fmtISO(d) {
  if (!d) return '';
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysFrom(d) { return d ? Math.round((d-TODAY)/86400000) : null; }

function getStage(t) {
  if (!t.transplant || TODAY < t.transplant) return 'Pending';
  if (!t.flip       || TODAY < t.flip)       return 'Veg';
  if (!t.harvest    || TODAY < t.harvest)    return 'Flower';
  if (!t.cure       || TODAY < t.cure)       return 'Cure';
  return 'Complete';
}
function getNext(t) {
  for (const [l,d] of [['Transplant',t.transplant],['Flip',t.flip],['Harvest',t.harvest],['Cure done',t.cure]]) {
    if (!d) continue; const df = daysFrom(d); if (df >= 0) return {l, d:df};
  }
  return null;
}
function rb(r) { return `<span class="rb ${r==='Tunable'?'r1':r==='HPS'?'r2':'r3'}">${r||'?'}</span>`; }
function sp(s) { const m={Pending:'sppend',Veg:'spveg',Flower:'spflr',Cure:'spcure',Complete:'spdone'}; return `<span class="sp ${m[s]||'spdone'}">${s}</span>`; }
function nb(m) {
  if (!m) return '<span class="nb ndone">Complete</span>';
  const c = m.d<=3?'nurg':m.d<=7?'nsoon':'nok';
  const t = m.d===0?'Today!':m.d===1?'Tomorrow':m.d+'d';
  return `<span class="nb ${c}">${m.l} · ${t}</span>`;
}

function filteredTrials() {
  return TRIALS.filter(t => {
    if (F.room  !== 'all' && t.room     !== F.room)  return false;
    if (F.stage !== 'all' && getStage(t)!== F.stage) return false;
    return true;
  });
}

function sf(btn) {
  const g=btn.dataset.g, v=btn.dataset.v; F[g]=v;
  document.querySelectorAll(`.fb[data-g="${g}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); render();
}

// ── Gantt render ──────────────────────────────
function renderGantt() {
  const data = filteredTrials();
  const axisEl = document.getElementById('gantt-axis');
  const bodyEl = document.getElementById('gantt-body');
  if (!axisEl || !bodyEl) return;

  const allDates = data.flatMap(t=>[t.transplant,t.cure||t.harvest||t.flip||t.transplant]).filter(Boolean);
  if (!allDates.length) { bodyEl.innerHTML=''; axisEl.innerHTML=''; return; }

  const minD = allDates.reduce((a,b)=>a<b?a:b);
  // Total canvas width = span of all dates + padding
  const maxD = allDates.reduce((a,b)=>a>b?a:b);
  const totalDays = Math.ceil((maxD-minD)/86400000) + 60;
  const totalW = totalDays * PX_PER_DAY;

  function xOf(d) { return d ? (d-minD)/86400000*PX_PER_DAY - scrollX : null; }
  function dateAtX(px) { return new Date(minD.getTime() + (px+scrollX)/PX_PER_DAY*86400000); }

  // ── Axis ticks ──
  const axisW = axisEl.parentElement.clientWidth;
  let axisHTML = `<div style="position:relative;width:${axisW}px;height:32px;overflow:hidden">`;
  // Draw a tick every ~60px
  const tickDays = Math.ceil(60 / PX_PER_DAY);
  const startDay = Math.floor(scrollX / PX_PER_DAY);
  for (let d = startDay - 2; d < startDay + Math.ceil(axisW/PX_PER_DAY) + 2; d++) {
    if (d % tickDays !== 0) continue;
    const xpx = d * PX_PER_DAY - scrollX;
    if (xpx < -20 || xpx > axisW + 20) continue;
    const tickDate = new Date(minD.getTime() + d * 86400000);
    const lbl = tickDate.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    axisHTML += `<div class="axis-tick" style="left:${xpx}px"><div class="axis-tick-line"></div><div class="axis-tick-label">${lbl}</div></div>`;
  }
  // Today marker on axis
  const todayX = xOf(TODAY);
  if (todayX !== null && todayX >= 0 && todayX <= axisW) {
    axisHTML += `<div style="position:absolute;left:${todayX}px;top:0;width:2px;height:100%;background:var(--coral);opacity:.5"></div>`;
  }
  axisHTML += '</div>';
  axisEl.innerHTML = axisHTML;

  // Hover on axis shows date
  axisEl.onmousemove = e => {
    const rect = axisEl.getBoundingClientRect();
    const d = dateAtX(e.clientX - rect.left);
    showTip(d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}), e);
  };
  axisEl.onmouseleave = hideTip;

  // ── Gantt rows ──
  let rowsHTML = '';
  data.forEach(t => {
    const st = getStage(t);
    const lbl = t.description || t.strain || ('Cohort '+t.cohort);
    const m = getNext(t);
    const dl = m ? (m.d===0?'Today':m.d===1?'1d':m.d+'d') : 'Done';
    const dc = m ? (m.d<=3?'var(--coral)':m.d<=7?'var(--amber)':'var(--green)') : 'var(--text3)';

    // Build bars
    let bars = '';
    const trackW = axisW;

    function makeBar(startD, endD, cls, label, tipLabel) {
      const x1 = xOf(startD);
      const x2 = xOf(endD);
      if (x1 === null || x2 === null) return '';
      const left = Math.max(x1, -2);
      const right = Math.min(x2, trackW+2);
      const w = right - left;
      if (w < 2) return '';
      return `<div class="bar ${cls}" style="left:${left.toFixed(1)}px;width:${w.toFixed(1)}px"
        data-tip="${tipLabel}: ${fmtD(startD)} → ${fmtD(endD)}"
        onmouseenter="showTip(this.dataset.tip,event)" onmousemove="moveTip(event)" onmouseleave="hideTip()">${label}</div>`;
    }

    if (!t.transplant) {
      bars = `<div class="bar bpend" style="left:8px;width:80px" data-tip="Pending — no transplant date set"
        onmouseenter="showTip(this.dataset.tip,event)" onmousemove="moveTip(event)" onmouseleave="hideTip()">PENDING</div>`;
    } else {
      const txX = xOf(t.transplant);
      if (txX !== null) {
        bars += `<div style="position:absolute;left:${txX.toFixed(1)}px;top:15%;width:2px;height:70%;background:var(--green);opacity:0.7;border-radius:1px;z-index:99"
          data-tip="Transplant: ${fmtD(t.transplant)}"
          onmouseenter="showTip(this.dataset.tip,event)" onmousemove="moveTip(event)" onmouseleave="hideTip()"></div>`;
      }
      const vegEnd = t.flip || (TODAY > t.transplant ? TODAY : new Date(t.transplant.getTime() + 7*86400000));
      bars += makeBar(t.transplant, vegEnd, 'bveg', 'VEG', 'Veg');
      if (t.flip && t.harvest) bars += makeBar(t.flip, t.harvest, 'bflr', 'FLOWER', 'Flower');
      else if (t.flip && !t.harvest) bars += makeBar(t.flip, TODAY > t.flip ? TODAY : t.flip, 'bflr', 'FLOWER', 'Flower');
      if (t.harvest) {
        const ce = t.cure || new Date(t.harvest.getTime() + 30*86400000);
        bars += makeBar(t.harvest, ce, st==='Complete'?'bdone':'bcure', 'CURE', 'Cure');
      }
    }
    // Today line within track
    const tx = xOf(TODAY);
    const todayLineHTML = (tx !== null && tx >= 0 && tx <= trackW)
      ? `<div class="today-line" style="left:${tx.toFixed(1)}px"></div>` : '';

    rowsHTML += `<div class="gantt-row">
      <div class="gantt-meta" onclick="toggleNotes(${t.cohort})" title="Click to view/edit notes">
        <div class="gn" title="${lbl}">${lbl}</div>
        ${t.strain ? `<div class="gs">${t.strain}</div>` : ''}
        <div class="gmeta-sub">${rb(t.room)}<span class="cohort-num">C${t.cohort}</span><span class="days-label" style="color:${dc}">${dl}</span></div>
      </div>
      <div class="gantt-track-wrap"><div class="gantt-track" style="position:relative;height:100%">${todayLineHTML}${bars}</div></div>
    </div>`;
  });
  bodyEl.innerHTML = rowsHTML || '<div style="padding:2rem;text-align:center;color:var(--text3);font-family:DM Mono,monospace;font-size:12px">No trials match filters</div>';
}

// ── Table render ──────────────────────────────
function renderTable() {
  const data = filteredTrials();
  let tb = '';
  data.forEach(t => {
    const m = getNext(t);
    const tc = t.todo ? t.todo.length : 0;
    const ti = t.todo ? t.todo.map(x=>`<div class="ti"><div class="td-dot"></div>${x}</div>`).join('') : '';
    const lbl = t.description || t.strain || ('Cohort '+t.cohort);

    tb += `<tr>
      <td style="color:var(--text3);font-family:DM Mono,monospace;font-size:12px">${t.cohort}</td>
      <td>${editCell(t.cohort,'description',lbl,'text')}</td>
      <td>${editCell(t.cohort,'strain',t.strain||'','text')}</td>
      <td>${editRoomCell(t)}</td>
      <td>${editCell(t.cohort,'transplant',fmtISO(t.transplant),'date',fmtD(t.transplant))}</td>
      <td>${editCell(t.cohort,'flip',fmtISO(t.flip),'date',fmtD(t.flip))}</td>
      <td>${editCell(t.cohort,'harvest',fmtISO(t.harvest),'date',fmtD(t.harvest))}</td>
      <td>${editCell(t.cohort,'cure',fmtISO(t.cure),'date',fmtD(t.cure))}</td>
      <td>${nb(m)}</td>
      <td style="min-width:200px;white-space:normal">
        <div id="todo-list-${t.cohort}">
          ${t.todo && t.todo.length > 0
            ? t.todo.map((task, i) => `
              <div style="display:flex;align-items:flex-start;gap:6px;padding:2px 0">
                <input type="checkbox" style="margin-top:3px;accent-color:var(--green);flex-shrink:0"
                  onchange="toggleTodoItem(${t.cohort}, ${i}, this.checked)"
                  ${task.startsWith('[x] ') ? 'checked' : ''}>
                <span style="font-size:12px;color:var(--text);line-height:1.4">${task.replace(/^\[x\] /,'')}</span>
              </div>`).join('')
            : ''}
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
            <input type="text" placeholder="Add task…" id="new-todo-${t.cohort}"
              style="font-size:12px;padding:3px 6px;width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text)"
              onkeydown="if(event.key==='Enter')addTodoItem(${t.cohort})">
          </div>
        </div>
      </td>
      <td style="text-align:center"><span style="cursor:pointer;font-size:14px;color:var(--text3)" onclick="toggleNotes(${t.cohort})" title="Notes">&#9998;</span></td>
    </tr>
    <tr class="notes-row" id="notes-row-${t.cohort}" style="display:none">
      <td colspan="11">
        <div class="notes-panel">
          <div class="notes-label">Notes — C${t.cohort} ${lbl}</div>
          <textarea class="notes-ta" id="notes-ta-${t.cohort}" rows="3">${t.notes||''}</textarea>
          <button class="notes-save" onclick="saveNotes(${t.cohort})">Save notes</button>
        </div>
      </td>
    </tr>`;
  });
  document.getElementById('tbody').innerHTML = tb || '<tr><td colspan="11" style="padding:2rem;text-align:center;color:var(--text3)">No trials match filters</td></tr>';
}

// ── Editable cell helpers ─────────────────────
function editCell(cohort, field, value, type, display) {
  const disp = display || value || '<span style="color:var(--text3)">—</span>';
  return `<span class="editable" data-cohort="${cohort}" data-field="${field}" data-type="${type}" data-value="${value||''}" onclick="startEdit(this)">${disp}</span>`;
}

function editRoomCell(t) {
  return `<span class="editable" data-cohort="${t.cohort}" data-field="room" data-type="room" data-value="${t.room||''}" onclick="startEdit(this)">${rb(t.room)}</span>`;
}

function startEdit(el) {
  if (el.classList.contains('editing')) return;
  el.classList.add('editing');
  const cohort = parseInt(el.dataset.cohort);
  const field  = el.dataset.field;
  const type   = el.dataset.type;
  const value  = el.dataset.value;

  let input;
  if (type === 'room') {
    input = document.createElement('select');
    ['Tunable','HPS','LED'].forEach(opt => {
      const o = document.createElement('option');
      o.value = opt; o.textContent = opt;
      if (opt === value) o.selected = true;
      input.appendChild(o);
    });
  } else if (type === 'date') {
    input = document.createElement('input');
    input.type = 'date'; input.value = value;
  } else {
    input = document.createElement('input');
    input.type = 'text'; input.value = value;
  }

  el.innerHTML = '';
  el.appendChild(input);
  input.focus();

  function commit() {
    const newVal = input.value.trim();
    el.classList.remove('editing');
    if (newVal !== value) {
      saveField(cohort, field, newVal);
    } else {
      renderTable();
    }
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); if(e.key==='Escape'){el.classList.remove('editing');renderTable();} });
}

function saveNotes(cohort) {
  const ta = document.getElementById('notes-ta-'+cohort);
  if (!ta) return;
  saveField(cohort, 'notes', ta.value);
}

function toggleNotes(cohort) {
  const row = document.getElementById('notes-row-'+cohort);
  if (!row) return;
  if (openNotes && openNotes !== row) openNotes.style.display='none';
  row.style.display = row.style.display==='none' ? 'table-row' : 'none';
  openNotes = row.style.display!=='none' ? row : null;
  if (row.style.display!=='none') {
    const ta = document.getElementById('notes-ta-'+cohort);
    if (ta) ta.focus();
  }
}

function toggleTodo(id) {
  const el = document.getElementById('tp-'+id);
  if (!el) return;
  if (openPopup && openPopup !== el) openPopup.classList.remove('open');
  el.classList.toggle('open');
  openPopup = el.classList.contains('open') ? el : null;
}
document.addEventListener('click', e => {
  if (openPopup && !e.target.closest('.tc') && !e.target.closest('.tp')) { openPopup.classList.remove('open'); openPopup=null; }
});

// ── Stats render ──────────────────────────────
function renderStats() {
  const data = filteredTrials();
  const active   = data.filter(t=>getStage(t)!=='Complete').length;
  const urgent   = data.filter(t=>{const m=getNext(t);return m&&m.d<=3;}).length;
  const complete = data.filter(t=>getStage(t)==='Complete').length;
  const am = data.filter(t=>getNext(t));
  const avg = am.length ? Math.round(am.reduce((a,t)=>a+getNext(t).d,0)/am.length) : 0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Active trials</div><div class="stat-value">${active}</div><div class="stat-sub">of ${data.length} shown</div></div>
    <div class="stat"><div class="stat-label">Avg days to milestone</div><div class="stat-value">${avg}</div><div class="stat-sub">across active</div></div>
    <div class="stat"><div class="stat-label">Urgent (≤3 days)</div><div class="stat-value ${urgent>0?'urgent':''}">${urgent}</div><div class="stat-sub">need attention now</div></div>
    <div class="stat"><div class="stat-label">Open to-dos</div><div class="stat-value">${TRIALS.reduce((a,t)=>a+(t.todo?t.todo.length:0),0)}</div><div class="stat-sub">all trials</div></div>`;
}

function render() { renderStats(); renderGantt(); renderTable(); }

// ── Init ──────────────────────────────────────
window.addEventListener('resize', () => renderGantt());

document.addEventListener('wheel', e => {
  const gantt = document.getElementById('gantt-axis');
  if (!gantt) return;
  if (!gantt.closest('.gantt-outer').contains(e.target)) return;
  e.preventDefault();
  const delta = e.deltaY > 0 ? -1 : 1;
  PX_PER_DAY = Math.max(4, Math.min(60, PX_PER_DAY + delta));
  centreOnToday();
  renderGantt();
}, { passive: false });

// Set up drag on axis after first render
const observer = new MutationObserver(() => {
  const axis = document.getElementById('gantt-axis');
  if (axis && !axis._dragInit) { axis._dragInit=true; initDrag(axis); }
  const body = document.getElementById('gantt-body');
  if (body && !body._dragInit) { body._dragInit=true; initDrag(body); }
});
observer.observe(document.body, {childList:true, subtree:true});

loadData();

function toggleTodoItem(cohort, index, checked) {
  const t = TRIALS.find(t => t.cohort === cohort);
  if (!t) return;
  const tasks = [...(t.todo || [])];
  tasks[index] = checked
    ? '[x] ' + tasks[index].replace(/^\[x\] /, '')
    : tasks[index].replace(/^\[x\] /, '');
  t.todo = tasks;
  saveField(cohort, 'todo', tasks.join('\n'));
}

function addTodoItem(cohort) {
  const input = document.getElementById('new-todo-' + cohort);
  if (!input || !input.value.trim()) return;
  const t = TRIALS.find(t => t.cohort === cohort);
  if (!t) return;
  const tasks = [...(t.todo || []), input.value.trim()];
  t.todo = tasks;
  input.value = '';
  saveField(cohort, 'todo', tasks.join('\n'));
}

</script>
